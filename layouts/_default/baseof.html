<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{ block "title" . }}shazow | Andrey Petrov{{ end }}</title>

    <link href="/css/base.css?7" media="screen" rel="stylesheet" type="text/css" />
    <link rel="icon" type="image/png" href="/images/icon.png" />

    <link rel="alternate" type="application/rss+xml" title="RSS Feed shazow.net" href="/index.xml" />

    {{ $fontCSS := "https://fonts.googleapis.com/css2?family=OFL+Sorts+Mill+Goudy+TT:ital@0;1&display=optional" }}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="{{ $fontCSS }}" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link href="{{ $fontCSS }}" rel="stylesheet"></noscript>
    {{ block "extra_head" . }}{{ end }}
    <meta name="twitter:site" content="@shazow">
    <meta name="twitter:creator" content="@shazow">
    {{ if .IsPage -}}
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="{{ .Title }}" />
    <meta name="twitter:description" content="{{ .Summary }}" />
    {{ if .Params.image }}<meta name="twitter:image" content="{{ .Permalink }}{{ .Params.image }}" />{{ end }}
    {{ else -}}
    <meta name="twitter:title" content="{{ .Site.Title }}" />
    <meta name="twitter:description" content="{{ .Description }}" />
    {{ end }}
</head>


<body>

{{ block "body" . }}{{ end }}

<script>
    if (!['localhost', '127.0.0.1'].includes(document.location.hostname)) {
        (window.requestIdleCallback || window.setTimeout)(function() {
            (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
            (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
            m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
            })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

            ga('create', 'UA-407051-1', 'shazow.net');
            ga('send', 'pageview');
        });
    }
</script>

{{ block "tail" . }}{{ end }}

</body>

</html>
